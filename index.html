<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Maple Retro Hero</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#07131f;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}body{display:grid;place-items:center}.wrap{position:relative;width:min(100vw,800px);aspect-ratio:4/3}canvas{display:block;width:100%;height:100%;background:#10253d;image-rendering:auto}.pad,.act{position:absolute;bottom:18px;display:flex;gap:12px;z-index:3}.pad{left:18px}.act{right:18px}.btn{width:64px;height:64px;border-radius:50%;border:2px solid #f7dc8b;background:rgba(10,22,34,.72);color:#fff;font-weight:900;font-size:22px;box-shadow:0 5px 0 rgba(0,0,0,.35)}.atk{width:72px;height:72px;background:rgba(130,36,30,.8)}.jump{background:rgba(28,78,122,.8)}.hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:13px;color:#ffe9a3;text-shadow:0 2px 2px #000;white-space:nowrap}@media(max-width:760px),(pointer:coarse){.hint{display:none}.btn{width:58px;height:58px}.atk{width:68px;height:68px}}</style></head><body><div class="wrap"><canvas id="game" width="800" height="600"></canvas><div class="hint">← → 이동 / Space·Alt 점프 / Ctrl 공격 / K 사망 테스트</div><div class="pad"><button class="btn" data-k="ArrowLeft">←</button><button class="btn" data-k="ArrowRight">→</button></div><div class="act"><button class="btn jump" data-k="Space">J</button><button class="btn atk" data-k="Control">A</button></div></div><script>(()=>{const repo='https://raw.githubusercontent.com/123koven0128-alt/node-test/main/';const c=document.getElementById('game'),ctx=c.getContext('2d'),W=800,H=600,keys={};ctx.imageSmoothingEnabled=false;let last=0,shake=0;function load(src){const i=new Image();i.crossOrigin='anonymous';i.src=repo+src;return i}const assets={bg:load('gwanghwamun-bg-deploy.jpg'),idle:[load('frames/idle-right.png')],run:[0,1,2,3,4,5].map(i=>load(`frames/run-${i}.png`)),attack:[0,1,2,3,4].map(i=>load(`frames/attack-${i}.png`)),death:[0,1,2,3,4,5].map(i=>load(`frames/death-${i}.png`))};const plats=[{x:0,y:535,w:800,h:48},{x:44,y:382,w:230,h:24},{x:360,y:318,w:225,h:24},{x:590,y:422,w:190,h:24},{x:250,y:456,w:220,h:22}],p={x:110,y:210,w:54,h:82,vx:0,vy:0,face:1,on:false,jumps:0,hp:100,mp:100,lv:1,exp:0,need:100,atk:0,atkFrame:0,atkTick:0,runFrame:0,runTick:0,dead:0,deathFrame:0,deathTick:0,inv:0},mons=[{x:95,y:0,plat:1,dir:1,hp:2,hit:0,dead:0},{x:430,y:0,plat:2,dir:-1,hp:2,hit:0,dead:0},{x:655,y:0,plat:3,dir:1,hp:2,hit:0,dead:0},{x:315,y:0,plat:4,dir:-1,hp:2,hit:0,dead:0}],nums=[];function tone(f,d,t='sine',v=.06){let A=window.AudioContext||window.webkitAudioContext;if(!A)return;if(!tone.a)tone.a=new A();let a=tone.a,o=a.createOscillator(),q=a.createGain();o.type=t;o.frequency.value=f;q.gain.value=v;o.connect(q);q.connect(a.destination);o.start();q.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.stop(a.currentTime+d)}function music(){if(music.on)return;music.on=1;setInterval(()=>{tone(196,.28,'triangle',.016);setTimeout(()=>tone(247,.22,'triangle',.012),290);setTimeout(()=>tone(294,.28,'triangle',.012),580)},930)}function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function down(k){keys[k]=1;music();if((k===' '||k==='Space'||k==='Alt')&&p.jumps<2&&!p.dead){p.vy=-12.5;p.on=0;p.jumps++;tone(430,.12,'square',.035)}if((k==='Control'||k==='ControlLeft'||k==='ControlRight')&&!p.dead&&p.atk<=0){p.atk=.34;p.atkFrame=0;p.atkTick=0;tone(560,.08,'sawtooth',.07);setTimeout(()=>tone(880,.08,'triangle',.05),45)}if(k==='k'||k==='K')p.dead=.01}addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' ','Space','Alt','Control','ControlLeft','ControlRight','k','K'].includes(e.key)||e.code==='Space'){e.preventDefault();down(e.key===' '?'Space':e.key)}});addEventListener('keyup',e=>{keys[e.key]=0;keys[e.code]=0});document.querySelectorAll('.btn').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{e.preventDefault();down(k)};b.onpointerup=b.onpointercancel=e=>{keys[k]=0}});function update(dt){if(p.dead){p.dead+=dt;p.deathTick++;if(p.deathTick>=8){p.deathTick=0;p.deathFrame=Math.min(5,p.deathFrame+1)}if(p.dead>2.7){Object.assign(p,{x:110,y:210,vx:0,vy:0,hp:100,mp:100,dead:0,deathFrame:0,deathTick:0,face:1});mons.forEach((m,i)=>Object.assign(m,{hp:2,dead:0,hit:0,x:[95,430,655,315][i]}))}return}if(keys.ArrowLeft){p.vx-=28*dt;p.face=-1}if(keys.ArrowRight){p.vx+=28*dt;p.face=1}p.vx*=Math.pow(.81,dt*60);p.vx=Math.max(-5.2,Math.min(5.2,p.vx));p.vy+=28*dt;p.x=Math.max(0,Math.min(W-p.w,p.x+p.vx*60*dt));p.on=0;p.y+=p.vy*60*dt;for(const q of plats)if(p.vy>=0&&p.x+p.w>q.x+4&&p.x<q.x+q.w-4&&p.y+p.h>=q.y&&p.y+p.h-p.vy*60*dt<=q.y+3){p.y=q.y-p.h;p.vy=0;p.on=1;p.jumps=0}if(p.y>H+60)p.dead=.01;if(p.atk>0){p.atk-=dt;p.atkTick++;if(p.atkTick>=4){p.atkTick=0;p.atkFrame=Math.min(4,p.atkFrame+1)}let box={x:p.face>0?p.x+p.w-4:p.x-82,y:p.y+15,w:86,h:48};mons.forEach(m=>{if(m.hp>0&&m.hit<=0&&overlap(box,{x:m.x-25,y:m.y-38,w:50,h:38})){m.hp--;m.hit=.22;shake=.08;nums.push({x:m.x,y:m.y-48,t:0,v:m.hp?'85':'KO'});tone(m.hp?170:90,.12,'square',.07);if(m.hp<=0){m.dead=.01;p.exp+=35;if(p.exp>=p.need){p.exp-=p.need;p.lv++;p.need=Math.floor(p.need*1.35);p.hp=100;p.mp=100;tone(720,.35,'triangle',.08)}}}})}else{p.atkFrame=0}if(p.on&&Math.abs(p.vx)>.45&&p.atk<=0){p.runTick++;if(p.runTick>=5){p.runTick=0;p.runFrame=(p.runFrame+1)%6}}else{p.runTick=0;p.runFrame=0}mons.forEach(m=>{let q=plats[m.plat];if(m.hp<=0){m.dead+=dt;return}m.x+=m.dir*55*dt;if(m.x<q.x+28||m.x>q.x+q.w-28)m.dir*=-1;m.y=q.y;if(overlap(p,{x:m.x-23,y:m.y-34,w:46,h:34})&&p.inv<=0){p.hp-=12;p.vx=-m.dir*4;p.vy=-6;p.inv=.8;nums.push({x:p.x+25,y:p.y-12,t:0,v:'-12'});tone(110,.1,'sawtooth',.06);if(p.hp<=0)p.dead=.01}m.hit=Math.max(0,m.hit-dt)});p.inv=Math.max(0,p.inv-dt);nums.forEach(n=>n.t+=dt);for(let i=nums.length-1;i>=0;i--)if(nums[i].t>1)nums.splice(i,1);shake=Math.max(0,shake-dt)}function background(){if(assets.bg.complete&&assets.bg.naturalWidth){ctx.drawImage(assets.bg,0,0,W,H);return}let grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#68c8ff');grd.addColorStop(.45,'#b9eaff');grd.addColorStop(1,'#304b35');ctx.fillStyle=grd;ctx.fillRect(0,0,W,H)}function platform(q){ctx.fillStyle='#5c5547';ctx.fillRect(q.x,q.y,q.w,q.h);ctx.fillStyle='#8b826c';for(let i=q.x;i<q.x+q.w;i+=32)ctx.fillRect(i,q.y,28,14);ctx.fillStyle='#2f2b25';ctx.fillRect(q.x,q.y+q.h-6,q.w,6);ctx.fillStyle='#76ad4c';ctx.fillRect(q.x,q.y-5,q.w,6)}function drawSprite(im,x,y,w,h,facesRight=true){if(!(im&&im.complete&&im.naturalWidth))return false;ctx.save();if((facesRight&&p.face<0)||(!facesRight&&p.face>0)){ctx.translate(x+w,y);ctx.scale(-1,1);ctx.drawImage(im,0,0,w,h)}else ctx.drawImage(im,x,y,w,h);ctx.restore();return true}function hero(){let moving=p.on&&Math.abs(p.vx)>.45&&p.atk<=0,frames=assets.idle,idx=0,facesRight=true,w=130,h=150,ox=-65,oy=-140;if(p.dead){frames=assets.death;idx=p.deathFrame;w=168;h=118;ox=-84;oy=-108}else if(p.atk>0){frames=assets.attack;idx=p.atkFrame;w=220;h=132;ox=p.face>0?-118:-104;oy=-122}else if(moving){frames=assets.run;idx=p.runFrame;facesRight=false;w=150;h=128;ox=-75;oy=-120}ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(p.x+p.w/2,p.y+p.h+4,p.dead?50:moving?32:24,8,0,0,7);ctx.fill();let im=frames[idx]||frames[0];if(!drawSprite(im,p.x+p.w/2+ox,p.y+p.h+oy,w,h,facesRight)){ctx.fillStyle='#121b2e';ctx.fillRect(p.x,p.y,40,70);ctx.fillStyle='#f0bf8e';ctx.beginPath();ctx.arc(p.x+20,p.y+8,16,0,7);ctx.fill()}if(p.atk>0&&!p.dead){ctx.save();ctx.translate(p.face>0?p.x+p.w+22:p.x-22,p.y+42);ctx.scale(p.face,1);let t=1-p.atk/.34;ctx.strokeStyle='#86d9ff';ctx.lineWidth=10;ctx.beginPath();ctx.arc(0,0,52,-.95+t*.7,.82+t*.35);ctx.stroke();ctx.globalAlpha=.35;ctx.lineWidth=24;ctx.stroke();ctx.restore()}}function monster(m){if(m.dead>1)return;ctx.save();ctx.globalAlpha=m.hp>0?1:Math.max(0,1-m.dead);ctx.translate(m.x,m.y-17);ctx.scale(m.dir,1);ctx.fillStyle=m.hit>0?'#ff6b68':'#78d74f';ctx.strokeStyle='#19421c';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(0,0,25,18+Math.sin(performance.now()/150)*3,0,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#102512';ctx.beginPath();ctx.arc(-8,-3,3,0,7);ctx.arc(8,-3,3,0,7);ctx.fill();ctx.fillRect(-7,7,14,3);ctx.restore()}function hud(){ctx.fillStyle='rgba(15,20,26,.82)';ctx.fillRect(0,0,W,58);ctx.fillStyle='#ffd66e';ctx.font='bold 18px serif';ctx.fillText('LV.'+p.lv+' 하율',18,24);function bar(x,y,w,col,v,t){ctx.fillStyle='#222';ctx.fillRect(x,y,w,13);ctx.fillStyle=col;ctx.fillRect(x,y,w*Math.max(0,Math.min(1,v)),13);ctx.strokeStyle='#e7d7a7';ctx.strokeRect(x,y,w,13);ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.fillText(t,x+5,y+10)}bar(115,12,185,'#d83d3d',p.hp/100,'HP');bar(315,12,145,'#2b86de',p.mp/100,'MP');bar(475,12,230,'#efc84a',p.exp/p.need,'EXP '+Math.floor(p.exp/p.need*100)+'%')}function draw(){ctx.save();if(shake)ctx.translate((Math.random()-.5)*6,(Math.random()-.5)*5);background();plats.forEach(platform);mons.forEach(monster);hero();nums.forEach(n=>{ctx.globalAlpha=1-n.t;ctx.fillStyle=n.v==='KO'?'#ffe066':'#ff4747';ctx.strokeStyle='#111';ctx.lineWidth=4;ctx.font='bold 24px serif';ctx.strokeText(n.v,n.x,n.y-n.t*38);ctx.fillText(n.v,n.x,n.y-n.t*38);ctx.globalAlpha=1});ctx.restore();hud();if(p.dead){ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 34px serif';ctx.fillText('K.O.',360,250)}}function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop)})();</script></body></html>
