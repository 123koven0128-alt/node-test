<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Maple Retro Hero</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#07131f;color:white;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}body{display:grid;place-items:center}.wrap{position:relative;width:min(100vw,800px);aspect-ratio:4/3}canvas{width:100%;height:100%;display:block;background:#132337}.pad,.act{position:absolute;bottom:18px;display:flex;gap:12px}.pad{left:18px}.act{right:18px}.btn{width:64px;height:64px;border-radius:50%;border:2px solid #f7dc8b;background:rgba(10,22,34,.72);color:#fff;font-weight:900;font-size:22px;box-shadow:0 5px 0 rgba(0,0,0,.35)}.atk{width:72px;height:72px;background:rgba(130,36,30,.8)}.jump{background:rgba(28,78,122,.8)}.hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:13px;color:#ffe9a3;text-shadow:0 2px 2px #000;white-space:nowrap}@media(max-width:760px),(pointer:coarse){.hint{display:none}.btn{width:58px;height:58px}.atk{width:68px;height:68px}}</style></head><body><div class="wrap"><canvas id="game" width="800" height="600"></canvas><div class="hint">← → 이동 / Space·Alt 점프 / Ctrl 공격</div><div class="pad"><button class="btn" data-k="ArrowLeft">←</button><button class="btn" data-k="ArrowRight">→</button></div><div class="act"><button class="btn jump" data-k="Space">J</button><button class="btn atk" data-k="Control">A</button></div></div><script>(()=>{const c=document.getElementById('game'),g=c.getContext('2d'),W=800,H=600,keys={};let last=0,shake=0;const plats=[{x:0,y:535,w:800,h:48},{x:44,y:382,w:230,h:24},{x:360,y:318,w:225,h:24},{x:590,y:422,w:190,h:24},{x:250,y:456,w:220,h:22}],p={x:110,y:210,w:54,h:82,vx:0,vy:0,face:1,on:false,jumps:0,hp:100,mp:100,lv:1,exp:0,need:100,atk:0,dead:0,inv:0},mons=[{x:95,y:0,plat:1,dir:1,hp:2,hit:0,dead:0},{x:430,y:0,plat:2,dir:-1,hp:2,hit:0,dead:0},{x:655,y:0,plat:3,dir:1,hp:2,hit:0,dead:0},{x:315,y:0,plat:4,dir:-1,hp:2,hit:0,dead:0}],nums=[];function tone(f,d,t='sine',v=.06){let A=window.AudioContext||window.webkitAudioContext;if(!A)return;if(!tone.a)tone.a=new A();let a=tone.a,o=a.createOscillator(),q=a.createGain();o.type=t;o.frequency.value=f;q.gain.value=v;o.connect(q);q.connect(a.destination);o.start();q.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.stop(a.currentTime+d)}function music(){if(music.on)return;music.on=1;setInterval(()=>{tone(196,.28,'triangle',.018);setTimeout(()=>tone(247,.22,'triangle',.014),290);setTimeout(()=>tone(294,.28,'triangle',.014),580)},930)}function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function down(k){keys[k]=1;music();if((k===' '||k==='Space'||k==='Alt')&&p.jumps<2&&!p.dead){p.vy=-12.5;p.on=0;p.jumps++;tone(430,.12,'square',.035)}if((k==='Control'||k==='ControlLeft'||k==='ControlRight')&&!p.dead&&p.atk<=0){p.atk=.28;tone(560,.08,'sawtooth',.07);setTimeout(()=>tone(880,.08,'triangle',.05),45)}}addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' ','Space','Alt','Control','ControlLeft','ControlRight'].includes(e.key)||e.code==='Space'){e.preventDefault();down(e.key===' '?'Space':e.key)}});addEventListener('keyup',e=>{keys[e.key]=0;keys[e.code]=0});document.querySelectorAll('.btn').forEach(b=>{let k=b.dataset.k;b.onpointerdown=e=>{e.preventDefault();down(k)};b.onpointerup=b.onpointercancel=e=>{keys[k]=0}});function upd(dt){if(p.dead){p.dead+=dt;if(p.dead>2.4){Object.assign(p,{x:110,y:210,vx:0,vy:0,hp:100,mp:100,dead:0,face:1});mons.forEach((m,i)=>Object.assign(m,{hp:2,dead:0,hit:0,x:[95,430,655,315][i]}))}return}if(keys.ArrowLeft){p.vx-=28*dt;p.face=-1}if(keys.ArrowRight){p.vx+=28*dt;p.face=1}p.vx*=Math.pow(.81,dt*60);p.vx=Math.max(-5.2,Math.min(5.2,p.vx));p.vy+=28*dt;p.x=Math.max(0,Math.min(W-p.w,p.x+p.vx*60*dt));p.on=0;p.y+=p.vy*60*dt;for(const q of plats)if(p.vy>=0&&p.x+p.w>q.x+4&&p.x<q.x+q.w-4&&p.y+p.h>=q.y&&p.y+p.h-p.vy*60*dt<=q.y+3){p.y=q.y-p.h;p.vy=0;p.on=1;p.jumps=0}if(p.y>H+60)p.dead=.01;if(p.atk>0){p.atk-=dt;let box={x:p.face>0?p.x+p.w-4:p.x-82,y:p.y+15,w:86,h:48};mons.forEach(m=>{if(m.hp>0&&m.hit<=0&&hit(box,{x:m.x-25,y:m.y-38,w:50,h:38})){m.hp--;m.hit=.22;shake=.08;nums.push({x:m.x,y:m.y-48,t:0,v:m.hp?'85':'KO'});tone(m.hp?170:90,.12,'square',.07);if(m.hp<=0){m.dead=.01;p.exp+=35;if(p.exp>=p.need){p.exp-=p.need;p.lv++;p.need=Math.floor(p.need*1.35);p.hp=100;p.mp=100;tone(720,.35,'triangle',.08)}}}})}mons.forEach(m=>{let q=plats[m.plat];if(m.hp<=0){m.dead+=dt;return}m.x+=m.dir*55*dt;if(m.x<q.x+28||m.x>q.x+q.w-28)m.dir*=-1;m.y=q.y;let b={x:m.x-23,y:m.y-34,w:46,h:34};if(hit(p,b)&&p.inv<=0){p.hp-=12;p.vx=-m.dir*4;p.vy=-6;p.inv=.8;nums.push({x:p.x+25,y:p.y-12,t:0,v:'-12'});tone(110,.1,'sawtooth',.06);if(p.hp<=0)p.dead=.01}m.hit=Math.max(0,m.hit-dt)});p.inv=Math.max(0,p.inv-dt);nums.forEach(n=>n.t+=dt);for(let i=nums.length-1;i>=0;i--)if(nums[i].t>1)nums.splice(i,1);shake=Math.max(0,shake-dt)}function bg(){let grd=g.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#68c8ff');grd.addColorStop(.45,'#b9eaff');grd.addColorStop(1,'#304b35');g.fillStyle=grd;g.fillRect(0,0,W,H);g.fillStyle='rgba(255,255,255,.82)';for(let i=0;i<6;i++){let x=(i*155+40)%840,y=45+i%3*55;g.beginPath();g.ellipse(x,y,52,18,0,0,7);g.ellipse(x+40,y+5,48,15,0,0,7);g.fill()}g.fillStyle='#5c9b68';for(let i=0;i<5;i++){g.beginPath();g.moveTo(i*190-35,356);g.lineTo(i*190+85,150+i%2*36);g.lineTo(i*190+230,356);g.fill()}g.fillStyle='#d9d0bd';g.fillRect(290,266,220,130);g.fillStyle='#26384a';g.fillRect(255,238,290,27);g.fillRect(275,206,250,34);g.fillStyle='#95502d';[325,395,465].forEach(a=>{g.fillRect(a,316,44,80);g.beginPath();g.arc(a+22,316,22,Math.PI,0);g.fill()});g.fillStyle='rgba(25,70,86,.55)';g.fillRect(0,500,W,52)}function platform(q){g.fillStyle='#5c5547';g.fillRect(q.x,q.y,q.w,q.h);g.fillStyle='#8b826c';for(let i=q.x;i<q.x+q.w;i+=32)g.fillRect(i,q.y,28,14);g.fillStyle='#2f2b25';g.fillRect(q.x,q.y+q.h-6,q.w,6);g.fillStyle='#76ad4c';g.fillRect(q.x,q.y-5,q.w,6)}function hero(){let cx=p.x+p.w/2,ground=p.y+p.h,run=Math.floor(performance.now()/85)%6,attack=p.atk>0,death=p.dead>0,squash=death?Math.min(1,p.dead*1.4):0,bob=p.on&&!attack?Math.sin(performance.now()/90)*2:0;g.save();g.translate(cx,ground);g.scale(p.face,1);g.lineWidth=5;g.fillStyle='rgba(0,0,0,.35)';g.beginPath();g.ellipse(0,4,death?48:30,8,0,0,7);g.fill();if(death){g.rotate(.25);g.translate(0,18*squash);g.scale(1,1-.55*squash)}else g.translate(0,bob);function limb(ax,ay,bx,by,col='#f7d0a2'){g.strokeStyle='#1a1110';g.lineWidth=8;g.beginPath();g.moveTo(ax,ay);g.lineTo(bx,by);g.stroke();g.strokeStyle=col;g.lineWidth=4;g.stroke()}let step=run%2?1:-1;if(attack)step=0;limb(-12,-24,-20+step*5,-4,'#151923');limb(12,-24,20-step*5,-4,'#151923');g.fillStyle='#121b2e';g.strokeStyle='#090909';g.lineWidth=5;g.beginPath();g.moveTo(-23,-61);g.lineTo(22,-60);g.lineTo(18,-10);g.lineTo(-20,-10);g.closePath();g.fill();g.stroke();g.fillStyle='#8c1d1f';g.fillRect(-23,-40,46,8);g.fillStyle='#d4a145';g.fillRect(-7,-42,14,12);g.fillStyle='#0e1422';g.fillRect(-26,-12,21,34);g.fillRect(5,-12,21,34);limb(-13,18,-22,38,'#151923');limb(13,18,23,38,'#151923');g.fillStyle='#f0bf8e';g.strokeStyle='#090909';g.lineWidth=4;g.beginPath();g.arc(0,-78,19,0,7);g.fill();g.stroke();g.fillStyle='#26160f';g.beginPath();g.arc(-4,-88,22,Math.PI*.9,Math.PI*2.12);g.fill();g.beginPath();g.ellipse(-20,-82,13,24,-.5,0,7);g.fill();g.beginPath();g.ellipse(-30,-62,10,33,-.9,0,7);g.fill();g.beginPath();g.ellipse(-5,-104,10,32,-1.15,0,7);g.fill();g.fillStyle='#ad2924';g.fillRect(-10,-105,23,6);g.fillStyle='#111';g.fillRect(-8,-80,5,5);g.fillRect(10,-80,5,5);g.fillStyle='#553018';g.fillRect(-7,-70,20,3);let armY=attack?-42:-36,handX=attack?42:25;limb(18,-48,handX,armY);limb(-18,-47,-33,-33);g.strokeStyle='#dbefff';g.lineWidth=5;g.beginPath();g.moveTo(24,-35);g.lineTo(attack?88:50,attack?-37:-58);g.stroke();g.strokeStyle='#6aa7ff';g.lineWidth=2;g.stroke();if(attack){let t=1-p.atk/.28;g.globalAlpha=.9;g.strokeStyle='#86d9ff';g.lineWidth=10;g.beginPath();g.arc(46,-38,45,-.9+t*.7,.75+t*.4);g.stroke();g.globalAlpha=.45;g.lineWidth=22;g.stroke();g.globalAlpha=1}if(p.inv>0){g.strokeStyle='#fff';g.lineWidth=3;g.strokeRect(-31,-112,62,156)}if(death&&p.dead>.7){g.globalAlpha=Math.max(0,1-(p.dead-.7)/1.5);g.fillStyle='#9bb3c6';for(let i=0;i<5;i++){g.beginPath();g.arc(-25+i*12,-60-p.dead*26-i*4,8+i,0,7);g.fill()}}g.restore()}function monster(m){if(m.dead>1)return;let a=m.hp>0?1:Math.max(0,1-m.dead);g.save();g.globalAlpha=a;g.translate(m.x,m.y-17);g.scale(m.dir,1);g.fillStyle=m.hit>0?'#ff6b68':'#78d74f';g.strokeStyle='#19421c';g.lineWidth=4;g.beginPath();g.ellipse(0,0,25,18+Math.sin(performance.now()/150)*3,0,0,7);g.fill();g.stroke();g.fillStyle='#102512';g.beginPath();g.arc(-8,-3,3,0,7);g.arc(8,-3,3,0,7);g.fill();g.fillRect(-7,7,14,3);g.restore()}function hud(){g.fillStyle='rgba(15,20,26,.82)';g.fillRect(0,0,W,58);g.fillStyle='#ffd66e';g.font='bold 18px serif';g.fillText('LV.'+p.lv+' 하율',18,24);function bar(x,y,w,col,v,t){g.fillStyle='#222';g.fillRect(x,y,w,13);g.fillStyle=col;g.fillRect(x,y,w*Math.max(0,Math.min(1,v)),13);g.strokeStyle='#e7d7a7';g.strokeRect(x,y,w,13);g.fillStyle='#fff';g.font='11px sans-serif';g.fillText(t,x+5,y+10)}bar(115,12,185,'#d83d3d',p.hp/100,'HP');bar(315,12,145,'#2b86de',p.mp/100,'MP');bar(475,12,230,'#efc84a',p.exp/p.need,'EXP '+Math.floor(p.exp/p.need*100)+'%')}function draw(){g.save();if(shake)g.translate((Math.random()-.5)*6,(Math.random()-.5)*5);bg();plats.forEach(platform);mons.forEach(monster);hero();nums.forEach(n=>{g.globalAlpha=1-n.t;g.fillStyle=n.v==='KO'?'#ffe066':'#ff4747';g.strokeStyle='#111';g.lineWidth=4;g.font='bold 24px serif';g.strokeText(n.v,n.x,n.y-n.t*38);g.fillText(n.v,n.x,n.y-n.t*38);g.globalAlpha=1});g.restore();hud();if(p.dead){g.fillStyle='rgba(0,0,0,.35)';g.fillRect(0,0,W,H);g.fillStyle='#fff';g.font='bold 34px serif';g.fillText('K.O.',360,250);g.font='16px sans-serif';g.fillText('잠시 후 부활합니다',332,282)}}function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;upd(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop)})();</script></body></html>
