<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Maple Retro Hero</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#07131f;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}body{display:grid;place-items:center}.wrap{position:relative;width:min(100vw,800px);aspect-ratio:4/3}canvas{width:100%;height:100%;display:block;background:#10253d}.pad,.act{position:absolute;bottom:18px;display:flex;gap:12px;z-index:3}.pad{left:18px}.act{right:18px}.btn{width:62px;height:62px;border-radius:50%;border:2px solid #f7dc8b;background:rgba(11,24,36,.62);color:#fff;font-weight:900;font-size:22px;box-shadow:0 4px 0 rgba(0,0,0,.35);-webkit-user-select:none;user-select:none}.atk{width:72px;height:72px;background:rgba(142,32,38,.78)}.jump{background:rgba(28,78,122,.78)}.hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:13px;color:#f9e7a9;text-shadow:0 2px 2px #000}@media(min-width:760px){.pad,.act{opacity:.55}}</style></head><body><div class="wrap"><canvas id="game" width="800" height="600"></canvas><div class="hint">← → 이동 / Space·Alt 점프 / Ctrl 공격</div><div class="pad"><button class="btn" data-k="ArrowLeft">←</button><button class="btn" data-k="ArrowRight">→</button></div><div class="act"><button class="btn jump" data-k="Space">J</button><button class="btn atk" data-k="Control">A</button></div></div><script>(()=>{const c=document.getElementById('game'),x=c.getContext('2d');const W=800,H=600,keys={};let last=0,shake=0;const plats=[{x:0,y:535,w:800,h:46},{x:42,y:380,w:230,h:24},{x:360,y:315,w:225,h:24},{x:590,y:420,w:190,h:24},{x:250,y:455,w:220,h:22}];const p={x:105,y:200,w:54,h:82,vx:0,vy:0,face:1,on:false,jumps:0,hp:100,mp:100,lv:1,exp:0,need:100,atk:0,dead:0,inv:0};const mons=[{x:90,y:320,plat:1,dir:1,hp:2,hit:0,dead:0},{x:415,y:255,plat:2,dir:-1,hp:2,hit:0,dead:0},{x:655,y:360,plat:3,dir:1,hp:2,hit:0,dead:0},{x:310,y:397,plat:4,dir:-1,hp:2,hit:0,dead:0}];const nums=[];function tone(f,d,type='sine',v=.08){const A=window.AudioContext||window.webkitAudioContext;if(!A)return;if(!tone.a)tone.a=new A();const a=tone.a,o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(a.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.stop(a.currentTime+d)}function startBgm(){if(startBgm.on)return;startBgm.on=1;setInterval(()=>{tone(196,.35,'triangle',.025);setTimeout(()=>tone(246,.3,'triangle',.018),320);setTimeout(()=>tone(294,.35,'triangle',.018),640)},980)}function rect(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function down(k){keys[k]=true;startBgm();if((k===' '||k==='Space'||k==='Alt')&&p.jumps<2&&!p.dead){p.vy=-12.6;p.on=false;p.jumps++;tone(420,.12,'square',.035)}if((k==='Control'||k==='ControlLeft'||k==='ControlRight')&&!p.dead&&p.atk<=0){p.atk=.28;tone(540,.07,'sawtooth',.07);setTimeout(()=>tone(860,.08,'triangle',.055),45)}}addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight',' ','Space','Alt','Control','ControlLeft','ControlRight'].includes(e.key)||e.code==='Space'){e.preventDefault();down(e.key===' '?'Space':e.key)}});addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false});document.querySelectorAll('.btn').forEach(b=>{const k=b.dataset.k;b.onpointerdown=e=>{e.preventDefault();down(k)};b.onpointerup=b.onpointercancel=e=>{keys[k]=false}});function update(dt){if(p.dead){p.dead+=dt;if(p.dead>2.5){Object.assign(p,{x:105,y:200,vx:0,vy:0,hp:100,mp:100,dead:0,face:1});mons.forEach((m,i)=>Object.assign(m,{hp:2,dead:0,hit:0,x:[90,415,655,310][i]}))}return}if(keys.ArrowLeft){p.vx-=28*dt;p.face=-1}if(keys.ArrowRight){p.vx+=28*dt;p.face=1}p.vx*=Math.pow(.81,dt*60);p.vx=Math.max(-5.2,Math.min(5.2,p.vx));p.vy+=28*dt;p.x+=p.vx*60*dt;p.x=Math.max(0,Math.min(W-p.w,p.x));p.on=false;p.y+=p.vy*60*dt;for(const q of plats){if(p.vy>=0&&p.x+p.w>q.x+4&&p.x<q.x+q.w-4&&p.y+p.h>=q.y&&p.y+p.h-p.vy*60*dt<=q.y+3){p.y=q.y-p.h;p.vy=0;p.on=true;p.jumps=0}}if(p.y>H+80)p.dead=.01;if(p.atk>0){p.atk-=dt;const hb={x:p.face>0?p.x+p.w-4:p.x-82,y:p.y+16,w:86,h:46};mons.forEach(m=>{if(m.hp>0&&m.hit<=0&&rect(hb,{x:m.x-25,y:m.y-38,w:50,h:38})){m.hp--;m.hit=.22;shake=.08;nums.push({x:m.x,y:m.y-48,t:0,v:m.hp?'85':'KO'});tone(m.hp?170:90,.12,'square',.075);if(m.hp<=0){m.dead=.01;p.exp+=35;if(p.exp>=p.need){p.exp-=p.need;p.lv++;p.need=Math.floor(p.need*1.35);p.hp=100;p.mp=100;tone(720,.35,'triangle',.08)}}}})}mons.forEach(m=>{const q=plats[m.plat];if(m.hp<=0){m.dead+=dt;return}m.x+=m.dir*55*dt;if(m.x<q.x+28||m.x>q.x+q.w-28)m.dir*=-1;m.y=q.y;const body={x:m.x-23,y:m.y-34,w:46,h:34};if(rect(p,body)&&p.inv<=0){p.hp-=12;p.vx=-m.dir*4;p.vy=-6;p.inv=.8;nums.push({x:p.x+25,y:p.y-12,t:0,v:'-12'});tone(110,.1,'sawtooth',.06);if(p.hp<=0)p.dead=.01}});p.inv=Math.max(0,p.inv-dt);nums.forEach(n=>n.t+=dt);for(let i=nums.length-1;i>=0;i--)if(nums[i].t>1)nums.splice(i,1);shake=Math.max(0,shake-dt)}function bg(){let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#67c7ff');g.addColorStop(.45,'#b7e5ff');g.addColorStop(1,'#243a2d');x.fillStyle=g;x.fillRect(0,0,W,H);x.fillStyle='rgba(255,255,255,.8)';for(let i=0;i<6;i++){let cx=(i*160+40)%850,cy=45+i%3*55;x.beginPath();x.ellipse(cx,cy,50,18,0,0,7);x.ellipse(cx+38,cy+4,52,15,0,0,7);x.fill()}x.fillStyle='#5fa168';for(let i=0;i<5;i++){x.beginPath();x.moveTo(i*190-30,350);x.lineTo(i*190+90,145+i%2*34);x.lineTo(i*190+230,350);x.fill()}x.fillStyle='#d9d0bd';x.fillRect(290,265,220,130);x.fillStyle='#26384a';x.fillRect(255,238,290,26);x.fillRect(275,206,250,32);x.fillStyle='#96502d';[325,395,465].forEach(a=>{x.fillRect(a,315,44,80);x.beginPath();x.arc(a+22,315,22,Math.PI,0);x.fill()});x.fillStyle='rgba(25,70,86,.55)';x.fillRect(0,500,W,52)}function platform(q){x.fillStyle='#5c5547';x.fillRect(q.x,q.y,q.w,q.h);x.fillStyle='#8b826c';for(let i=q.x;i<q.x+q.w;i+=32)x.fillRect(i,q.y,28,14);x.fillStyle='#2f2b25';x.fillRect(q.x,q.y+q.h-6,q.w,6);x.fillStyle='#76ad4c';x.fillRect(q.x,q.y-5,q.w,6)}function hero(){const cx=p.x+p.w/2,ground=p.y+p.h,run=Math.floor(performance.now()/85)%6,attack=p.atk>0,death=p.dead>0;let squash=death?Math.min(1,p.dead*1.4):0;let bob=p.on&&!attack?Math.sin(performance.now()/90)*2:0;let dir=p.face;x.save();x.translate(cx,ground);x.scale(dir,1);x.lineWidth=5;x.strokeStyle='rgba(0,0,0,.9)';x.fillStyle='rgba(0,0,0,.35)';x.beginPath();x.ellipse(0,4,32,8,0,0,7);x.fill();if(death){x.rotate(.25);x.translate(0,18*squash);x.scale(1,1-.55*squash)}else x.translate(0,bob);function limb(ax,ay,bx,by,col='#f7d0a2'){x.strokeStyle='#1a1110';x.lineWidth=8;x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);x.stroke();x.strokeStyle=col;x.lineWidth=4;x.stroke()}let step=run%2?1:-1;if(attack)step=0;limb(-12,-24,-20+step*5,-4);limb(12,-24,20-step*5,-4);x.fillStyle='#121b2e';x.strokeStyle='#090909';x.lineWidth=5;x.beginPath();x.moveTo(-23,-61);x.lineTo(22,-60);x.lineTo(18,-10);x.lineTo(-20,-10);x.closePath();x.fill();x.stroke();x.fillStyle='#8c1d1f';x.fillRect(-23,-40,46,8);x.fillStyle='#d4a145';x.fillRect(-7,-42,14,12);x.fillStyle='#0e1422';x.fillRect(-26,-12,21,34);x.fillRect(5,-12,21,34);limb(-13,18,-22,38,'#151923');limb(13,18,23,38,'#151923');x.fillStyle='#f0bf8e';x.strokeStyle='#090909';x.lineWidth=4;x.beginPath();x.arc(0,-78,19,0,7);x.fill();x.stroke();x.fillStyle='#26160f';x.beginPath();x.arc(-4,-88,22,Math.PI*.9,Math.PI*2.12);x.fill();x.beginPath();x.ellipse(-20,-82,13,24,-.5,0,7);x.fill();x.beginPath();x.ellipse(-30,-62,10,33,-.9,0,7);x.fill();x.beginPath();x.ellipse(-5,-104,10,32,-1.15,0,7);x.fill();x.fillStyle='#ad2924';x.fillRect(-10,-105,23,6);x.fillStyle='#111';x.fillRect(-8,-80,5,5);x.fillRect(10,-80,5,5);x.fillStyle='#553018';x.fillRect(-7,-70,20,3);x.strokeStyle='#111';x.lineWidth=5;let armY=attack?-42:-36,handX=attack?42:25;limb(18,-48,handX,armY);x.strokeStyle='#dbefff';x.lineWidth=5;x.beginPath();x.moveTo(24,-35);x.lineTo(attack?88:50,attack?-37:-58);x.stroke();x.strokeStyle='#6aa7ff';x.lineWidth=2;x.stroke();limb(-18,-47,-33,-33);if(attack){let t=1-p.atk/.28;x.globalAlpha=.9;x.strokeStyle='#86d9ff';x.lineWidth=10;x.beginPath();x.arc(46,-38,45,-.9+t*.7,.75+t*.4);x.stroke();x.globalAlpha=.45;x.lineWidth=22;x.stroke();x.globalAlpha=1}if(p.inv>0){x.strokeStyle='#fff';x.lineWidth=3;x.strokeRect(-31,-112,62,156)}if(death&&p.dead>.7){x.globalAlpha=Math.max(0,1-(p.dead-.7)/1.5);x.fillStyle='#9bb3c6';for(let i=0;i<5;i++){x.beginPath();x.arc(-25+i*12,-60-p.dead*26-i*4,8+i,0,7);x.fill()}}x.restore()}function monster(m){if(m.dead>1)return;let a=m.hp>0?1:Math.max(0,1-m.dead);x.save();x.globalAlpha=a;x.translate(m.x,m.y-17);x.scale(m.dir,1);x.fillStyle=m.hit>0?'#ff6b68':'#78d74f';x.strokeStyle='#19421c';x.lineWidth=4;x.beginPath();x.ellipse(0,0,25,18+Math.sin(performance.now()/150)*3,0,0,7);x.fill();x.stroke();x.fillStyle='#102512';x.beginPath();x.arc(-8,-3,3,0,7);x.arc(8,-3,3,0,7);x.fill();x.fillRect(-7,7,14,3);x.restore();m.hit=Math.max(0,m.hit-1/60)}function hud(){x.fillStyle='rgba(15,20,26,.82)';x.fillRect(0,0,W,58);x.fillStyle='#ffd66e';x.font='bold 18px serif';x.fillText('LV.'+p.lv+'  하율',18,24);function bar(x0,y0,w,col,v,t){x.fillStyle='#222';x.fillRect(x0,y0,w,13);x.fillStyle=col;x.fillRect(x0,y0,w*Math.max(0,Math.min(1,v)),13);x.strokeStyle='#e7d7a7';x.strokeRect(x0,y0,w,13);x.fillStyle='#fff';x.font='11px sans-serif';x.fillText(t,x0+5,y0+10)}bar(115,12,185,'#d83d3d',p.hp/100,'HP');bar(315,12,145,'#2b86de',p.mp/100,'MP');bar(475,12,230,'#efc84a',p.exp/p.need,'EXP '+Math.floor(p.exp/p.need*100)+'%')}function draw(){x.save();if(shake)x.translate((Math.random()-.5)*6,(Math.random()-.5)*5);bg();plats.forEach(platform);mons.forEach(monster);hero();nums.forEach(n=>{x.globalAlpha=1-n.t;x.fillStyle=n.v==='KO'?'#ffe066':'#ff4747';x.strokeStyle='#111';x.lineWidth=4;x.font='bold 24px serif';x.strokeText(n.v,n.x,n.y-n.t*38);x.fillText(n.v,n.x,n.y-n.t*38);x.globalAlpha=1});x.restore();hud();if(p.dead){x.fillStyle='rgba(0,0,0,.35)';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.font='bold 34px serif';x.fillText('K.O.',360,250);x.font='16px sans-serif';x.fillText('잠시 후 부활합니다',332,282)}}function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();requestAnimationFrame(loop)}requestAnimationFrame(loop)})();</script></body></html>
